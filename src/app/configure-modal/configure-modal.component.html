

@if(isExpanded) {
<a
  class="btn-configure"
  role="button"
  data-bs-toggle="modal"
  data-bs-target="#confModal"
>
  <i class="fa-solid fa-gear"></i>
</a>

}


<div
  class="modal fade"
  id="confModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="newModalLabel"
  aria-hidden="false"
>
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="newModalLabel">Configure</h5>
        <button
          class="btn btn-danger btn-sm"
          data-bs-dismiss="modal"
          aria-label="Cancel"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="d-flex flex-row align-items-stretch">
          <button (click)="confirmImportModel()" class="btn btn-ets-do">
            Import Model
          </button>
          <input
            style="width: 600px"
            (change)="selectModelFile($event)"
            placeholder=""
            type="file"
            class="form-control"
          />
        </div>
        <div class="d-flex mt-2 flex-row align-items-stretch">
          <button (click)="changeModelRepo()" class="btn btn-ets-do">
            Change Repo
          </button>
          <input
            placeholder="Introduce new repository path"
            style="width: 600px"
            class="form-control"
            type="text"
            [(ngModel)]="newRepo"
          />
        </div>

        @if (isLoading) {
          <app-spinner [isLoading]="isLoading"/>
        }
      </div>
    </div>
  </div>
</div>
